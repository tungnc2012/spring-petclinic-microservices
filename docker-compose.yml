  api-gateway:
    image: tungnc2012/spring-petclinic-api-gateway:1.0.0
    container_name: api-gateway
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
     - 8081:8081

  admin-server:
    image: tungnc2012/spring-petclinic-admin-server:1.0.0
    container_name: admin-server
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
     - 9099:9099

