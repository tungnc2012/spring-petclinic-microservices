  #       condition: service_started
  #   ports:
  #    - 8085:8085
  #   networks:
  #     - petclinic-network
  #   environment:
  #     - SPRING_PROFILES_ACTIVE=docker

  api-gateway:
    image: tungnc2012/spring-petclinic-api-gateway:1.0.0
    container_name: api-gateway
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_started
    ports:
     - 8081:8081
    networks:
      - petclinic-network

  admin-server:
    image: tungnc2012/spring-petclinic-admin-server:1.0.0
    container_name: admin-server
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_started
    ports:
     - 9099:9099
    networks:
      - petclinic-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker

networks:
  petclinic-network:
    name: obser-stack-docker_petclinic-network
    external: true