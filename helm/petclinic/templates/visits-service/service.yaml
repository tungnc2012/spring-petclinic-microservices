apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-visits-service
  labels:
    {{- include "petclinic.labels" (dict "Release" .Release "Chart" .Chart "component" "visits-service") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.visitsService.port }}
      targetPort: {{ .Values.visitsService.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "petclinic.selectorLabels" (dict "Release" .Release "component" "visits-service") | nindent 4 }}
