apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-visits-service
  labels:
    {{- include "petclinic.labels" (dict "Release" .Release "Chart" .Chart "component" "visits-service") | nindent 4 }}
spec:
  replicas: {{ .Values.visitsService.replicaCount }}
  selector:
    matchLabels:
      {{- include "petclinic.selectorLabels" (dict "Release" .Release "component" "visits-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "petclinic.selectorLabels" (dict "Release" .Release "component" "visits-service") | nindent 8 }}
    spec:
      initContainers:
        {{- include "petclinic.initContainers.waitForDependencies" . | nindent 8 }}
      containers:
        - name: visits-service
          image: {{ include "petclinic.image" (dict "service" .Values.visitsService "global" .Values.global "defaultName" "spring-petclinic-visits-service") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.visitsService.port }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker{{- if .Values.mysql.enabled }},mysql{{- end }}"
            {{- if .Values.mysql.enabled }}
            - name: MYSQL_URL
              value: "jdbc:mysql://{{ .Values.mysql.host }}:{{ .Values.mysql.port }}/{{ .Values.mysql.database }}"
            - name: MYSQL_USER
              value: "{{ .Values.mysql.username }}"
            - name: MYSQL_PASS
              value: "{{ .Values.mysql.password }}"
            {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.visitsService.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.visitsService.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.visitsService.resources | nindent 12 }}
