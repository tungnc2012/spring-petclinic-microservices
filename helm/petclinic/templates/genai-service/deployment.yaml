apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-genai-service
  labels:
    {{- include "petclinic.labels" (dict "Release" .Release "Chart" .Chart "component" "genai-service") | nindent 4 }}
spec:
  replicas: {{ .Values.genaiService.replicaCount }}
  selector:
    matchLabels:
      {{- include "petclinic.selectorLabels" (dict "Release" .Release "component" "genai-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "petclinic.selectorLabels" (dict "Release" .Release "component" "genai-service") | nindent 8 }}
    spec:
      initContainers:
        {{- include "petclinic.initContainers.waitForDependencies" . | nindent 8 }}
      containers:
        - name: genai-service
          image: {{ include "petclinic.image" (dict "service" .Values.genaiService "global" .Values.global "defaultName" "spring-petclinic-genai-service") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.genaiService.port }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            {{- if .Values.genaiService.openaiApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-genai-secret
                  key: openai-api-key
            {{- end }}
            {{- if .Values.genaiService.azureOpenaiKey }}
            - name: AZURE_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-genai-secret
                  key: azure-openai-key
            {{- end }}
            {{- if .Values.genaiService.azureOpenaiEndpoint }}
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-genai-secret
                  key: azure-openai-endpoint
            {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.genaiService.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.genaiService.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.genaiService.resources | nindent 12 }}
