apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vets-service
  labels:
    {{- include "petclinic.labels" (dict "Release" .Release "Chart" .Chart "component" "vets-service") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.vetsService.port }}
      targetPort: {{ .Values.vetsService.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "petclinic.selectorLabels" (dict "Release" .Release "component" "vets-service") | nindent 4 }}
