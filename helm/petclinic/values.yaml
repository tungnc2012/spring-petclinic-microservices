global:
  imageRegistry: "springcommunity"
  imageTag: "latest"
  imagePullPolicy: IfNotPresent

configServer:
  replicaCount: 1
  image:
    repository: ""
    tag: ""
  port: 8888
  git:
    uri: "https://github.com/spring-petclinic/spring-petclinic-microservices-config"
    branch: "main"
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

discoveryServer:
  replicaCount: 1
  image:
    repository: ""
    tag: ""
  port: 8761
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

apiGateway:
  replicaCount: 1
  image:
    repository: ""
    tag: ""
  port: 8080
  service:
    type: ClusterIP
    nodePort: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

