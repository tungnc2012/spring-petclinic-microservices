apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
      - name: discovery-server
        image: tungnc2012/spring-petclinic-discovery-server:1.0.0
        ports:
        - containerPort: 8761
        resources:
          limits:
            cpu: "128m"
            memory: "256Mi"
          requests:
            cpu: "128m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 8761
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8761
          initialDelaySeconds: 30
          periodSeconds: 10 